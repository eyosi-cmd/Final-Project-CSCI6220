<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClusterOS Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">⚙</div>
                    <div>
                        <h1>ClusterOS</h1>
                        <p class="subtitle">Distributed Cluster Management System</p>
                    </div>
                </div>
                <div class="header-status">
                    <div class="status-indicator" id="system-status">
                        <span class="status-dot"></span>
                        <span class="status-text">Offline</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-grid">
            <!-- Controls Panel -->
            <section class="panel controls-panel">
                <div class="panel-header">
                    <h2>System Controls</h2>
                </div>
                <div class="panel-body">
                    <div class="control-section">
                        <h3>Load Balancer</h3>
                        <div class="button-row">
                            <button id="start-lb" class="btn btn-success" data-action="start-lb">
                                <span class="btn-icon">▶</span>
                                <span class="btn-text">Start LB</span>
                            </button>
                            <button id="stop-lb" class="btn btn-danger" data-action="stop-lb">
                                <span class="btn-icon">⏹</span>
                                <span class="btn-text">Stop LB</span>
                            </button>
                        </div>
                    </div>
                    <div class="control-section">
                        <h3>Workers</h3>
                        <div class="button-row">
                            <button id="add-worker" class="btn btn-primary" data-action="add-worker">
                                <span class="btn-icon">+</span>
                                <span class="btn-text">Add Worker</span>
                            </button>
                            <button id="remove-worker" class="btn btn-warning" data-action="remove-worker">
                                <span class="btn-icon">−</span>
                                <span class="btn-text">Remove Worker</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Metrics Panel -->
            <section class="panel metrics-panel">
                <div class="panel-header">
                    <h2>Live Metrics</h2>
                </div>
                <div class="panel-body">
                    <div class="metrics-container">
                        <div class="metric-card">
                            <div class="metric-header">Healthy Workers</div>
                            <div class="metric-value" id="metric-healthy">0</div>
                            <div class="metric-subtext">operational</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-header">Total Pool</div>
                            <div class="metric-value" id="metric-total">0</div>
                            <div class="metric-subtext">nodes</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-header">Active Jobs</div>
                            <div class="metric-value" id="metric-active">0</div>
                            <div class="metric-subtext">processing</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-header">Queued</div>
                            <div class="metric-value" id="metric-queued">0</div>
                            <div class="metric-subtext">pending</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Circuit Breakers Panel -->
            <section class="panel circuit-panel">
                <div class="panel-header">
                    <h2>Circuit Status</h2>
                </div>
                <div class="panel-body">
                    <div id="circuit-breakers" class="circuit-list">
                        <div class="empty-state">No circuits active</div>
                    </div>
                </div>
            </section>

            <!-- Job Submission Panel -->
            <section class="panel job-panel">
                <div class="panel-header">
                    <h2>Submit Job</h2>
                </div>
                <div class="panel-body">
                    <div class="form-section">
                        <label for="job-data" class="form-label">Job Payload (JSON Array)</label>
                        <div class="input-wrapper">
                            <textarea id="job-data" class="form-input" placeholder="[1, 2, 3, 4, 5]" spellcheck="false"></textarea>
                        </div>
                        <button id="submit-job" class="btn btn-accent" style="width: 100%">
                            <span class="btn-icon">►</span>
                            <span class="btn-text">Dispatch Job</span>
                        </button>
                    </div>
                    <div class="output-section">
                        <div class="output-header">
                            <span>Job Results</span>
                            <button id="clear-output" class="btn-small">Clear</button>
                        </div>
                        <pre id="job-results" class="terminal">Ready to dispatch jobs...</pre>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Inline client initialization
        // Dashboard client code loads below
    </script>
    <script src="/dashboard-client.js"></script>
</body>
</html>
