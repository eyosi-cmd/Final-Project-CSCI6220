<svg viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1280" height="400" fill="url(#bgGradient)"/>
  
  <path stroke="#1e90ff" stroke-width="2" fill="none" opacity="0.3">
    <animate attributeName="d" 
      values="M 0,50 Q 320,50 640,50 T 1280,50;
              M 0,80 Q 320,60 640,50 T 1280,70;
              M 0,50 Q 320,50 640,50 T 1280,50"
      dur="4s" repeatCount="indefinite"/>
  </path>
  
  <circle cx="200" cy="200" r="80" fill="none" stroke="#2a4a7a" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="200" r="65" fill="none" stroke="#1e5f99" stroke-width="1.5" opacity="0.4"/>
  
  <g transform="translate(200, 200)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#accentGradient)" stroke-width="8"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#1e90ff" stroke-width="1" opacity="0.3"/>
    
    <circle cx="30" cy="-15" r="6" fill="#1e90ff"/>
    <circle cx="-25" cy="20" r="6" fill="#1e90ff"/>
    <circle cx="20" cy="25" r="6" fill="#1e90ff"/>
    <circle cx="0" cy="-35" r="5" fill="#0066ff" filter="url(#glow)"/>
    
    <line x1="30" y1="-15" x2="0" y2="-35" stroke="#1e90ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="-35" x2="-25" y2="20" stroke="#1e90ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-25" y1="20" x2="20" y2="25" stroke="#1e90ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="20" y1="25" x2="30" y2="-15" stroke="#1e90ff" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <text x="380" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" letter-spacing="2">Cluster</text>
  <text x="1020" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#accentGradient)" letter-spacing="2">OS</text>
  
  <text x="380" y="200" font-family="Arial, sans-serif" font-size="28" fill="#b0c4de" font-weight="300" letter-spacing="1">Worker Nodes Health Metrics Dashboard</text>
  
  <line x1="350" y1="230" x2="1100" y2="230" stroke="#1e90ff" stroke-width="2" opacity="0.5"/>
  
  <g opacity="0.1">
    <circle cx="100" cy="80" r="3" fill="#1e90ff"/>
    <circle cx="150" cy="120" r="2.5" fill="#1e90ff"/>
    <circle cx="250" cy="100" r="2" fill="#1e90ff"/>
    <circle cx="1100" cy="150" r="3" fill="#1e90ff"/>
    <circle cx="1150" cy="250" r="2.5" fill="#1e90ff"/>
    <circle cx="1050" cy="300" r="2" fill="#1e90ff"/>
  </g>
</svg>