<svg viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="150" fill="url(#bgGradient)"/>
  
  <!-- Decorative network lines -->
  <line x1="0" y1="30" x2="800" y2="30" stroke="#1e90ff" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="75" x2="800" y2="75" stroke="#1e90ff" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="120" x2="800" y2="120" stroke="#1e90ff" stroke-width="1" opacity="0.2"/>
  
  <!-- Left side: Network nodes visualization -->
  <g transform="translate(60, 75)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="url(#accentGradient)" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="8" fill="#1e90ff" filter="url(#glow)"/>
    
    <!-- Connected nodes -->
    <circle cx="30" cy="-20" r="5" fill="#1e90ff" opacity="0.8"/>
    <circle cx="30" cy="20" r="5" fill="#1e90ff" opacity="0.8"/>
    <circle cx="-30" cy="0" r="5" fill="#1e90ff" opacity="0.7"/>
    
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="30" y2="-20" stroke="#1e90ff" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="30" y2="20" stroke="#1e90ff" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="-30" y2="0" stroke="#1e90ff" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Center: Brand name -->
  <text x="180" y="65" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#ffffff" letter-spacing="1">Cluster</text>
  <text x="560" y="65" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="url(#accentGradient)" letter-spacing="1">OS</text>
  
  <!-- Subtitle -->
  <text x="180" y="105" font-family="Arial, sans-serif" font-size="14" fill="#b0c4de" font-weight="300" letter-spacing="0.5">Worker Nodes Metrics Dashboard</text>
  
  <!-- Decorative accent dots -->
  <g opacity="0.3">
    <circle cx="200" cy="20" r="2" fill="#1e90ff"/>
    <circle cx="400" cy="25" r="1.5" fill="#1e90ff"/>
    <circle cx="650" cy="18" r="1.5" fill="#1e90ff"/>
  </g>
</svg>