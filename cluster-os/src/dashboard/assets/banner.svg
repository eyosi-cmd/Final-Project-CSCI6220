<svg viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d99;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="150" fill="url(#bgGradient)"/>
  
  <!-- Decorative network lines -->
  <line x1="0" y1="30" x2="800" y2="30" stroke="#0066cc" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="75" x2="800" y2="75" stroke="#0066cc" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="120" x2="800" y2="120" stroke="#0066cc" stroke-width="1" opacity="0.15"/>
  
  <!-- Left side: Network nodes visualization -->
  <g transform="translate(60, 75)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="url(#accentGradient)" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="8" fill="#0066cc" filter="url(#glow)"/>
    
    <!-- Connected nodes -->
    <circle cx="30" cy="-20" r="5" fill="#0066cc" opacity="0.8"/>
    <circle cx="30" cy="20" r="5" fill="#0066cc" opacity="0.8"/>
    <circle cx="-30" cy="0" r="5" fill="#0066cc" opacity="0.7"/>
    
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="30" y2="-20" stroke="#0066cc" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="0" x2="30" y2="20" stroke="#0066cc" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="0" x2="-30" y2="0" stroke="#0066cc" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Center: Brand name -->
  <text x="220" y="75" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#1a202c" letter-spacing="2" text-anchor="start">Cluster</text>
  <text x="545" y="75" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="url(#accentGradient)" letter-spacing="2" text-anchor="start">OS</text>
  
  <!-- Subtitle -->
  <text x="220" y="108" font-family="Arial, sans-serif" font-size="14" fill="#4b5563" font-weight="400" letter-spacing="0.5" text-anchor="start">Real-time cluster monitoring and control</text>
  
  <!-- Decorative accent dots -->
  <g opacity="0.3">
    <circle cx="200" cy="20" r="2.5" fill="#0066cc"/>
    <circle cx="400" cy="25" r="2" fill="#0066cc"/>
    <circle cx="650" cy="18" r="2" fill="#0066cc"/>
  </g>
</svg>