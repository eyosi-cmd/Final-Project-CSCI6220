services:
  - type: web
    name: cluster-os-backend
    env: node
    rootDir: cluster-os
    buildCommand: npm run build:render
    startCommand: npm run start:render
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: CLIENT_URL
        sync: false
      - key: AUTO_START_CLUSTER
        value: "true"
      - key: DISABLE_DNS_REGISTRATION
        value: "true"
      - key: WORKER_COUNT
        value: "2"
